<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    overflow-y:auto;
    background:linear-gradient(-45deg,#4338ca,#7e22ce,#2563eb,#9333ea);
    background-size:400% 400%;
    animation:bgGerak 12s ease infinite;
    padding:30px 15px;
    display:flex;
    justify-content:center;
}

@keyframes bgGerak{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }

}

.container{

    width:100%;
    max-width:500px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(18px);
    border-radius:30px;
    padding:35px;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
    border:1px solid rgba(255,255,255,0.2);
    animation:muncul 1s ease;

}

@keyframes muncul{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

.logo{

    font-size:80px;
    text-align:center;
    animation:lompat 2s infinite;

}

@keyframes lompat{

    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-10px);
    }

}

h1{

    text-align:center;
    color:white;
    margin-top:10px;
    font-size:30px;

}

.sub{

    text-align:center;
    color:#e5e7eb;
    margin-top:10px;
    margin-bottom:35px;
    line-height:1.7;
    font-size:14px;

}

.input-box{

    margin-bottom:20px;

}

label{

    display:block;
    margin-bottom:8px;
    color:white;
    font-weight:500;

}

input{

    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:rgba(255,255,255,0.2);
    color:white;
    font-size:15px;
    transition:0.3s;

}

input::placeholder{

    color:#e5e7eb;

}

input:focus{

    outline:none;
    background:rgba(255,255,255,0.3);
    transform:scale(1.02);

}

button{

    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:white;
    color:#4f46e5;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;

}

button:hover{

    transform:scale(1.03);

}

.error{

    display:none;
    margin-top:20px;
    background:#ef4444;
    color:white;
    padding:15px;
    border-radius:15px;
    text-align:center;
    animation:goyang 0.4s;

}

@keyframes goyang{

    0%{transform:translateX(0);}
    25%{transform:translateX(-8px);}
    50%{transform:translateX(8px);}
    75%{transform:translateX(-8px);}
    100%{transform:translateX(0);}

}

.hasil{

    display:none;
    margin-top:30px;
    background:rgba(255,255,255,0.12);
    border-radius:25px;
    padding:30px;
    text-align:center;
    animation:hasilMuncul 0.7s ease;

}

@keyframes hasilMuncul{

    from{
        opacity:0;
        transform:scale(0.8);
    }

    to{
        opacity:1;
        transform:scale(1);
    }

}

.nama{

    font-size:28px;
    font-weight:700;
    color:white;

}

.kelas{

    margin-top:8px;
    color:#e5e7eb;
    font-size:15px;

}

.mapel{

    margin-top:5px;
    color:#e5e7eb;
    font-size:14px;

}

.nilai{

    margin-top:30px;
    font-size:95px;
    font-weight:700;
    color:white;
    text-shadow:0 0 25px rgba(255,255,255,0.6);

}

.status{

    margin-top:20px;
    padding:15px;
    border-radius:18px;
    font-size:20px;
    font-weight:700;
    animation:pop 0.8s infinite alternate;

}

.tuntas{

    background:#22c55e;
    color:white;

}

.tidak{

    background:#ef4444;
    color:white;

}

@keyframes pop{

    from{
        transform:scale(1);
    }

    to{
        transform:scale(1.08);
    }

}

.remedial-btn{

    display:inline-block;
    margin-top:25px;
    padding:15px 25px;
    background:white;
    color:#7e22ce;
    border-radius:15px;
    text-decoration:none;
    font-weight:700;
    transition:0.3s;

}

.remedial-btn:hover{

.footer{

function cekNilai(){

    const namaInput = document.getElementById("namaInput").value.trim().toLowerCase();

    const nisInput = document.getElementById("nisInput").value.trim();

    const siswa = dataSiswa.find(s =>
        s.nama.toLowerCase() === namaInput &&
        s.nis === nisInput
    );

    const hasil = document.getElementById("hasil");

    const error = document.getElementById("error");

    if(siswa){

        error.style.display = "none";

        hasil.style.display = "block";

        document.getElementById("nama").innerText = siswa.nama;

        document.getElementById("kelas").innerText = "Kelas " + siswa.kelas;

        let angka = 0;

        const nilaiEl = document.getElementById("nilai");

        const interval = setInterval(() => {

            if(angka >= siswa.nilai){

                clearInterval(interval);

                tampilkanStatus(siswa.nilai);

            }else{

                angka++;

                nilaiEl.innerText = angka;

            }

        },20);

    }else{

        hasil.style.display = "none";

        error.style.display = "block";

    }

}

function tampilkanStatus(nilai){

    const statusContainer = document.getElementById("statusContainer");

    if(nilai >= 75){

        statusContainer.innerHTML = `

        <div class="status tuntas">
            🎉 Selamat, Nilai Anda Tuntas 🎉
        </div>

        `;

        confetti({
            particleCount:300,
            spread:180,
            origin:{ y:0.6 }
        });

    }else{

        statusContainer.innerHTML = `

        <div class="status tidak">
            ❌ Nilai Anda Belum Tuntas
        </div>

        <a class="remedial-btn"
        href="https://docs.google.com/forms/d/e/1FAIpQLSdhPGjMBRORtpxd0sX96YskLxdQ_UQ5bArNGwAU9qGG1WdLzg/viewform?usp=header"
        target="_blank">

        📄 Kerjakan Remedial

        </a>

        `;

    }

}

function lihatNIS(){

    const namaInput = document.getElementById("namaInput").value.trim().toLowerCase();

    const siswa = dataSiswa.find(s =>
        s.nama.toLowerCase() === namaInput
    );

    if(siswa){

        alert("NIS milik " + siswa.nama + " adalah:\n\n" + siswa.nis);

    }else{

        alert("Nama tidak ditemukan");

    }

}
